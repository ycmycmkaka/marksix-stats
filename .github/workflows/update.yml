name: Mark Six Auto Scraper

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        # 🌟 核武升級：安裝 playwright 同埋隱形 Chromium 瀏覽器
        run: |
          pip install pandas beautifulsoup4 playwright
          playwright install chromium
      - name: Run Scraper
        run: python scraper.py
      - name: Commit and Push
        run: |
          git config --global user.name 'Mark Six Bot'
          git config --global user.email 'bot@marksix.hk'
          git add data.csv
          git commit -m "Auto-update: Latest Mark Six results" || exit 0
          git push
